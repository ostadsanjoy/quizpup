<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Custom palette integration mappings */
        :root {
            --color-primary: #C78283;
            --color-light-bg: #F3D9DC;
            --color-accent-tan: #D7BEA8;
            --color-dark-brown: #B49286;
            --color-deep-plum: #744253;
        }
        body {
            background-color: var(--color-light-bg);
        }
    </style>
</head>
<body class="text-slate-800 font-sans min-h-screen flex flex-col items-center">
    
    <main class="w-full max-w-md bg-[#FFFBFB] h-screen flex flex-col justify-between shadow-xl relative overflow-hidden">
        
        <div class="flex-1 overflow-y-auto pb-24">
            {% block content %}{% endblock %}
        </div>

        {% if current_user.is_authenticated %}
        <nav class="absolute bottom-0 left-0 right-0 h-20 bg-[#D7BEA8] border-t border-[#B49286] flex justify-around items-center px-4 z-50 shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
            <a href="/home" class="flex flex-col items-center gap-1 transition transform active:scale-95">
                <img src="{{ url_for('static', filename='images/home.png') }}" class="h-8 w-8 object-contain {% if view == 'home' %} filter invert-[20%] sepia-[30%] saturate-[1000%] hue-rotate-[310deg] {% endif %}" alt="Home">
            </a>
            <a href="/new-quiz" class="flex flex-col items-center gap-1 transition transform active:scale-95">
                <img src="{{ url_for('static', filename='images/question.png') }}" class="h-8 w-8 object-contain {% if view == 'new_quiz' %} filter invert-[20%] sepia-[30%] saturate-[1000%] hue-rotate-[310deg] {% endif %}" alt="Create Quiz">
            </a>
            <a href="/account" class="flex flex-col items-center gap-1 transition transform active:scale-95">
                <img src="{{ url_for('static', filename='images/premium.png') }}" class="h-8 w-8 object-contain {% if view == 'account' %} filter invert-[20%] sepia-[30%] saturate-[1000%] hue-rotate-[310deg] {% endif %}" alt="Premium Feature">
            </a>
            <a href="/profile" class="flex flex-col items-center gap-1 transition transform active:scale-95">
                <img src="{{ url_for('static', filename='images/user.png') }}" class="h-8 w-8 object-contain {% if view == 'profile' %} filter invert-[20%] sepia-[30%] saturate-[1000%] hue-rotate-[310deg] {% endif %}" alt="Profile Dashboard">
            </a>
        </nav>
        {% endif %}
    </main>
</body>
</html>
