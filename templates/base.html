<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Quiz Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root {
            --color-primary: #C78283;
            --color-light-bg: #F3D9DC;
            --color-accent-tan: #D7BEA8;
            --color-dark-brown: #B49286;
            --color-deep-plum: #744253;
        }

        body {
            background-color: var(--color-light-bg);
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh;
            background-color: #FFFBFB;
            overflow: hidden;
            font-family: sans-serif;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100dvh;
            background-color: #FFFBFB;
        }

        .main-content {
            flex: 1;
            width: 100%;
            overflow-y: auto;
            box-sizing: border-box;
            -webkit-overflow-scrolling: touch;
        }

        .bottom-nav-bar {
            width: 100%;
            height: 80px;
            background-color: #D7BEA8;
            border-top: 1px solid #849286;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            box-sizing: border-box;
            flex-shrink: 0;
        }

        @font-face {
            font-family: 'DynaPuff';
            src: url('/static/fonts/DynaPuff-Bold.ttf') format('truetype');
            font-weight: 700;
        }


        .splash-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #e79241;
            z-index: 9999;
            animation: splashFadeOut 0.6s ease-out 1.5s forwards;
        }

        .splash-logo-text {
            font-family: 'DynaPuff', sans-serif;
            font-weight: 700;
            font-size: 4rem;
            color: #ffffff;
            margin: 0;
        }

        @keyframes splashFadeOut {
            from {
                opacity: 1;
                visibility: visible;
            }

            to {
                opacity: 0;
                visibility: hidden;
            }
        }
    </style>
</head>

<body>
    <div id="splash-screen" class="splash-screen">
        <h1 class="splash-logo-text">QuizPup</h1>
    </div>

    <script>
        (function () {
            var splash = document.getElementById('splash-screen');
            if (sessionStorage.getItem('quizpup_splash_shown')) {
                splash.remove();
            } else {
                sessionStorage.setItem('quizpup_splash_shown', 'true');
                splash.addEventListener('animationend', function () {
                    this.remove();
                });
            }
        })();
    </script>
    <div class="app-container">

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>

        {% if current_user.is_authenticated %}
        <nav class="bottom-nav-bar">

            <a href="/home" class="flex flex-col items-center transition transform active:scale-95">
                <img src="{{ url_for('static', filename='images/home.png') }}"
                    class="h-8 w-8 object-contain {% if view == 'home' %} filter invert-[20%] sepia-[30%] saturate-[1000%] hue-rotate-[310deg] {% endif %}"
                    alt="Home">
            </a>

            <a href="/new-quiz" class="flex flex-col items-center transition transform active:scale-95">
                <img src="{{ url_for('static', filename='images/question.png') }}"
                    class="h-8 w-8 object-contain {% if view == 'new_quiz' %} filter invert-[20%] sepia-[30%] saturate-[1000%] hue-rotate-[310deg] {% endif %}"
                    alt="Create Quiz">
            </a>

            <a href="/account" class="flex flex-col items-center transition transform active:scale-95">
                <img src="{{ url_for('static', filename='images/premium.png') }}"
                    class="h-8 w-8 object-contain {% if view == 'account' %} filter invert-[20%] sepia-[30%] saturate-[1000%] hue-rotate-[310deg] {% endif %}"
                    alt="Premium Feature">
            </a>

            <a href="/profile" class="flex flex-col items-center transition transform active:scale-95">
                <img src="{{ url_for('static', filename='images/user.png') }}"
                    class="h-8 w-8 object-contain {% if view == 'profile' %} filter invert-[20%] sepia-[30%] saturate-[1000%] hue-rotate-[310deg] {% endif %}"
                    alt="Profile Dashboard">
            </a>

        </nav>
        {% endif %}

    </div>
</body>

</html>
