<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Quiz Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Custom palette integration mappings */
        :root {
            --color-primary: #C78283;
            --color-light-bg: #F3D9DC;
            --color-accent-tan: #D7BEA8;
            --color-dark-brown: #B49286;
            --color-deep-plum: #744253;
        }

        body {
            background-color: var(--color-light-bg);
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh;
            background-color: #FFFBFB;
            overflow: hidden;
            font-family: sans-serif;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100dvh;
            background-color: #FFFBFB;
        }

        .main-content {
            flex: 1;
            width: 100%;
            overflow-y: auto;
            box-sizing: border-box;
            -webkit-overflow-scrolling: touch;
        }

        .bottom-nav-bar {
            width: 100%;
            height: 80px;
            background-color: #D7BEA8;
            border-top: 1px solid #849286;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            box-sizing: border-box;
            flex-shrink: 0;
        }

        #page-loader {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background-color: #e4923e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease-out;
        }

        #page-loader.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        #page-loader img {
            width: 240px;
            height: 240px;
            object-fit: contain;
            animation: loader-bounce 2s ease-in-out infinite;
        }

        @keyframes loader-bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-14px) scale(1.05); }
        }
    </style>
</head>

<body>
    <div id="page-loader">
        <img src="{{ url_for('static', filename='images/mascot-happy-sitting.png') }}" alt="Loading">
    </div>

    <script>
        (function () {
            const loader = document.getElementById('page-loader');
            const storageKey = 'quizpup_starter_loader_shown';

            if (sessionStorage.getItem(storageKey)) {
                loader.style.display = 'none';
                return;
            }

            const minVisibleMs = 700;
            const maxWaitMs = 4000;
            const startTime = Date.now();

            function hideLoader() {
                sessionStorage.setItem(storageKey, 'true');
                const elapsed = Date.now() - startTime;
                const remaining = Math.max(0, minVisibleMs - elapsed);
                setTimeout(() => {
                    loader.classList.add('fade-out');
                    setTimeout(() => loader.remove(), 450);
                }, remaining);
            }

            window.addEventListener('load', hideLoader);
            setTimeout(hideLoader, maxWaitMs);
        })();
    </script>
    <div class="app-container">

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>

        {% if current_user.is_authenticated %}
        <nav class="bottom-nav-bar">
            
            <a href="/home" class="flex flex-col items-center transition transform active:scale-95">
                <img src="{{ url_for('static', filename='images/home.png') }}" class="h-8 w-8 object-contain {% if view == 'home' %} filter invert-[20%] sepia-[30%] saturate-[1000%] hue-rotate-[310deg] {% endif %}" alt="Home">
            </a>

            <a href="/new-quiz" class="flex flex-col items-center transition transform active:scale-95">
                <img src="{{ url_for('static', filename='images/question.png') }}" class="h-8 w-8 object-contain {% if view == 'new_quiz' %} filter invert-[20%] sepia-[30%] saturate-[1000%] hue-rotate-[310deg] {% endif %}" alt="Create Quiz">
            </a>

            <a href="/account" class="flex flex-col items-center transition transform active:scale-95">
                <img src="{{ url_for('static', filename='images/premium.png') }}" class="h-8 w-8 object-contain {% if view == 'account' %} filter invert-[20%] sepia-[30%] saturate-[1000%] hue-rotate-[310deg] {% endif %}" alt="Premium Feature">
            </a>

            <a href="/profile" class="flex flex-col items-center transition transform active:scale-95">
                <img src="{{ url_for('static', filename='images/user.png') }}" class="h-8 w-8 object-contain {% if view == 'profile' %} filter invert-[20%] sepia-[30%] saturate-[1000%] hue-rotate-[310deg] {% endif %}" alt="Profile Dashboard">
            </a>

        </nav>
        {% endif %}

    </div>
</body>

</html>
