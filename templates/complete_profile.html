{% extends 'base.html' %}
{% block content %}
<div class="p-6 flex flex-col justify-center min-h-[80vh]">
    <div class="bg-white border border-[#B49286] p-8 rounded-[2.5rem] shadow-sm space-y-6 text-center max-w-lg mx-auto w-full">

        <div class="w-28 h-28 mx-auto flex items-center justify-center bg-[#F3D9DC] rounded-full p-2">
            <img src="{{ url_for('static', filename='images/mascot-happy-sitting.png') }}"
                class="max-h-full max-w-full object-contain" alt="Mascot">
        </div>

        <div>
            <h2 class="text-3xl font-serif font-bold text-[#744253]">Finish Setting Up</h2>
            <p class="text-xs text-[#B49286] font-medium mt-1">Just a few more details to get started</p>
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <div class="text-xs bg-rose-50 border border-rose-200 text-rose-600 p-2.5 rounded-xl font-medium">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" class="space-y-4 text-left">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label class="block text-xs font-bold text-[#744253] uppercase tracking-wider mb-1">Email</label>
                <input type="email" value="{{ pending.email }}" disabled
                    class="w-full border border-[#B49286] bg-slate-100 text-slate-500 rounded-xl p-3 text-sm">
            </div>
            <div>
                <label class="block text-xs font-bold text-[#744253] uppercase tracking-wider mb-1">Username</label>
                <input type="text" name="username" required value="{{ pending.suggested_username }}"
                    class="w-full border border-[#B49286] bg-[#FFFBFB] rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#C78283]">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-bold text-[#744253] uppercase tracking-wider mb-1">First Name</label>
                    <input type="text" name="first_name" required value="{{ pending.first_name }}"
                        class="w-full border border-[#B49286] bg-[#FFFBFB] rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#C78283]">
                </div>
                <div>
                    <label class="block text-xs font-bold text-[#744253] uppercase tracking-wider mb-1">Last Name</label>
                    <input type="text" name="last_name" required value="{{ pending.last_name }}"
                        class="w-full border border-[#B49286] bg-[#FFFBFB] rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#C78283]">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-[#744253] uppercase tracking-wider mb-1">Phone Number</label>
                <input type="tel" name="phone" required
                    class="w-full border border-[#B49286] bg-[#FFFBFB] rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#C78283]">
            </div>
            <button type="submit"
                class="w-full bg-[#744253] hover:bg-black text-white font-bold py-3.5 rounded-xl transition shadow-md text-sm mt-2">
                Complete Setup
            </button>
        </form>
    </div>
</div>
{% endblock %}
