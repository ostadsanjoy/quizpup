{% extends 'base.html' %}
{% block content %}
<div class="p-6 flex flex-col justify-center items-center min-h-[80vh] text-center">
    <div class="w-16 h-16 border-4 border-[#C78283] border-t-transparent rounded-full animate-spin mb-6"></div>
    <p id="oauthStatusText" class="text-sm font-medium text-[#744253]">Signing you in...</p>
    <a id="oauthRetryLink" href="/login" class="hidden text-xs text-[#B49286] underline mt-4">Back to login</a>
</div>

<script type="application/json" id="supabase-config">{"url": {{ supabase_url|tojson }}, "anonKey": {{ supabase_anon_key|tojson }}}</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script nonce="{{ csp_nonce() }}">
    (function () {
        var statusEl = document.getElementById('oauthStatusText');
        var retryLink = document.getElementById('oauthRetryLink');

        function showError(message) {
            statusEl.textContent = message;
            retryLink.classList.remove('hidden');
        }

        var config = JSON.parse(document.getElementById('supabase-config').textContent);
        var supabaseUrl = config.url;
        var supabaseAnonKey = config.anonKey;
        if (!supabaseUrl || !supabaseAnonKey) {
            showError('Sign-in is not configured yet. Please use username and password.');
            return;
        }

        var sb = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

        var loginHandled = false;

        async function finishLogin(session) {
            if (loginHandled) return;
            loginHandled = true;
            try {
                const response = await fetch('/auth/callback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ access_token: session.access_token })
                });
                const result = await response.json();
                if (result.success) {
                    window.location.href = result.redirect;
                } else {
                    showError(result.error || 'Sign-in failed. Please try again.');
                }
            } catch (err) {
                showError('Sign-in failed. Please try again.');
            }
        }

        sb.auth.onAuthStateChange(function (event, session) {
            if (session) finishLogin(session);
        });

        sb.auth.getSession().then(function (result) {
            if (result.data && result.data.session) {
                finishLogin(result.data.session);
            }
        });

        setTimeout(function () {
            if (statusEl.textContent === 'Signing you in...') {
                showError('This is taking longer than expected. Please try again.');
            }
        }, 10000);
    })();
</script>
{% endblock %}
